version: '3.8'

services:
  db:
    image: postgres:14
    container_name: financial_manager_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-financial_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    container_name: financial_manager_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3001:3000"
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: financial_manager_frontend
    restart: always
    ports:
      - "8081:80"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:


