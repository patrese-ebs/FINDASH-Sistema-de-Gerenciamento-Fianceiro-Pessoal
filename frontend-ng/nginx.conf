server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy (optional if not handled by Docker networking directly in app)
    # But usually Angular calls the backend URL directly or via this proxy
    # location /api/ {
    #     proxy_pass http://backend:3000/;
    # }
}
