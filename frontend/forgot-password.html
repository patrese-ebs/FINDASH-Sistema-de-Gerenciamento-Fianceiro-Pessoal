<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - FinDash</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-dark-bg text-text-primary font-sans antialiased p-4">
    <div class="card max-w-md w-full fade-in relative overflow-hidden">
        <!-- Background Decoration -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-accent-purple bg-opacity-10 rounded-full filter blur-xl -translate-y-1/2 translate-x-1/2">
        </div>
        <div
            class="absolute bottom-0 left-0 w-32 h-32 bg-accent-blue bg-opacity-10 rounded-full filter blur-xl translate-y-1/2 -translate-x-1/2">
        </div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold gradient-purple-blue bg-clip-text text-transparent mb-2">FinDash</h1>
                <p class="text-text-secondary">Recuperação de Conta</p>
            </div>

            <div id="successMessage"
                class="hidden mb-6 p-4 bg-green-500 bg-opacity-10 border border-green-500 rounded-lg text-green-400 text-sm text-center">
                E-mail enviado! Verifique sua caixa de entrada (e spam) para redefinir sua senha.
            </div>

            <form id="forgotForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium mb-2 text-text-secondary">E-mail</label>
                    <input type="email" id="email" class="input-field w-full" placeholder="seu@email.com" required>
                </div>

                <button type="submit"
                    class="btn-primary w-full py-3 font-semibold shadow-lg hover:shadow-accent-purple/20 transition-all duration-300">
                    Enviar Link de Recuperação
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login.html" class="text-sm text-accent-purple hover:text-accent-blue transition-colors">Voltar
                    para Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import api from '/src/js/api.js';

        const form = document.getElementById('forgotForm');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Loading state
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Enviando...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                // Determine API URL based on environment (for now, assuming relative path via proxy or simple logic)
                // Using the api instance directly
                await api.post('/auth/forgot-password', { email });

                successMessage.classList.remove('hidden');
                form.classList.add('hidden');
            } catch (error) {
                console.error('Error:', error);
                // Security: Don't show specific errors, just show success or generic error
                // In this case, we might want to mock success even on failure to prevent enumeration, 
                // but for UX let's show success message as if it worked (backend already does this).
                successMessage.classList.remove('hidden');
                form.classList.add('hidden');
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
