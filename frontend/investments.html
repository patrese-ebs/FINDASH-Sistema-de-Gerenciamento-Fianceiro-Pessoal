<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Investimentos - FinDash</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body class="min-h-screen bg-dark-bg text-text-primary font-sans antialiased">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-dark-card border-r border-dark-border p-6">
        <div class="mb-8">
            <h1 class="text-2xl font-bold gradient-purple-blue bg-clip-text text-transparent">FinDash</h1>
        </div>

        <nav class="space-y-2">
            <a href="/dashboard.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-dark-bg transition-colors text-text-secondary hover:text-text-primary">
                <span>📊</span>
                <span>Dashboard</span>
            </a>
            <a href="/transactions.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-dark-bg transition-colors text-text-secondary hover:text-text-primary">
                <span>💳</span>
                <span>Transações</span>
            </a>
            <a href="/investments.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg bg-accent-purple bg-opacity-20 text-accent-purple font-medium">
                <span>📈</span>
                <span>Investimentos</span>
            </a>
            <a href="/goals.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-dark-bg transition-colors text-text-secondary hover:text-text-primary">
                <span>🎯</span>
                <span>Metas</span>
            </a>
            <a href="/credit-cards.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-dark-bg transition-colors text-text-secondary hover:text-text-primary">
                <span>💳</span>
                <span>Cartões</span>
            </a>
        </nav>

        <div class="absolute bottom-6 left-6 right-6">
            <button id="logoutBtn"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-dark-bg transition-colors text-text-secondary hover:text-red-400">
                <span>🚪</span>
                <span>Sair</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 p-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-bold">Investimentos</h2>
                <p class="text-text-secondary mt-1">Acompanhe a evolução do seu patrimônio.</p>
            </div>
            <button id="addNewBtn" class="btn-primary">+ Novo Investimento</button>
        </div>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card fade-in" style="animation-delay: 0.1s">
                <div class="stat-label">Total Investido</div>
                <div class="stat-value text-white" id="totalInvested">R$ 0,00</div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s">
                <div class="stat-label">Valor Atual</div>
                <div class="stat-value text-accent-cyan" id="currentTotal">R$ 0,00</div>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.3s">
                <div class="stat-label">Rendimento Total</div>
                <div class="stat-value text-green-400" id="totalYield">R$ 0,00 (0%)</div>
            </div>
        </div>

        <!-- Investments List -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-dark-border">
                            <th class="text-left py-3 px-4 text-sm font-medium text-text-secondary">NOME</th>
                            <th class="text-left py-3 px-4 text-sm font-medium text-text-secondary">TIPO</th>
                            <th class="text-right py-3 px-4 text-sm font-medium text-text-secondary">VALOR INVESTIDO
                            </th>
                            <th class="text-right py-3 px-4 text-sm font-medium text-text-secondary">VALOR ATUAL</th>
                            <th class="text-right py-3 px-4 text-sm font-medium text-text-secondary">RENTABILIDADE</th>
                            <th class="text-right py-3 px-4 text-sm font-medium text-text-secondary">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="investmentsTableBody">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal"
        class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="card max-w-md w-full m-4 fade-in shadow-2xl border border-dark-border">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold" id="modalTitle">Novo Investimento</h3>
                <button id="closeModalBtn" class="text-text-secondary hover:text-text-primary">✕</button>
            </div>

            <form id="investmentForm" class="space-y-4">
                <input type="hidden" id="investmentId">

                <div>
                    <label class="block text-sm font-medium mb-2">Nome do Ativo</label>
                    <input type="text" id="name" class="input-field w-full" placeholder="Ex: Tesouro Selic 2029"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Tipo</label>
                    <select id="type" class="input-field w-full" required>
                        <option value="Renda Fixa">Renda Fixa</option>
                        <option value="Ações">Ações</option>
                        <option value="FIIs">FIIs</option>
                        <option value="Criptomoedas">Criptomoedas</option>
                        <option value="Fundos">Fundos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Valor Investido</label>
                        <input type="number" id="amountInvested" class="input-field w-full" step="0.01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Valor Atual</label>
                        <input type="number" id="currentValue" class="input-field w-full" step="0.01" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Data da Compra</label>
                    <input type="date" id="purchaseDate" class="input-field w-full" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Notas (Opcional)</label>
                    <textarea id="notes" class="input-field w-full h-20" placeholder="Detalhes opcionais..."></textarea>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancelBtn" class="btn-secondary flex-1">Cancelar</button>
                    <button type="submit" class="btn-primary flex-1">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import authService from '/src/js/auth.js';
        import investmentService from '/src/js/services/investmentService.js';

        if (!authService.isAuthenticated()) {
            window.location.href = '/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => authService.logout());

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);

        // State
        let investments = [];

        // DOM
        const tableBody = document.getElementById('investmentsTableBody');
        const modal = document.getElementById('modal');
        const form = document.getElementById('investmentForm');

        // Modal Controls
        const openModal = (investment = null) => {
            document.getElementById('modalTitle').textContent = investment ? 'Editar Investimento' : 'Novo Investimento';
            document.getElementById('investmentId').value = investment ? investment.id : '';
            document.getElementById('name').value = investment ? investment.name : '';
            document.getElementById('type').value = investment ? investment.type : 'Renda Fixa';
            document.getElementById('amountInvested').value = investment ? investment.amountInvested : '';
            document.getElementById('currentValue').value = investment ? investment.currentValue : '';
            document.getElementById('purchaseDate').value = investment ? investment.purchaseDate.split('T')[0] : new Date().toISOString().split('T')[0];
            document.getElementById('notes').value = investment ? investment.notes || '' : '';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        const closeModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        document.getElementById('addNewBtn').addEventListener('click', () => openModal());
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        // CRUD
        const loadInvestments = async () => {
            try {
                investments = await investmentService.getAll();
                renderTable();
                updateSummary();
            } catch (error) {
                console.error('Failed to load', error);
            }
        };

        const renderTable = () => {
            tableBody.innerHTML = investments.map(inv => {
                const invested = parseFloat(inv.amountInvested);
                const current = parseFloat(inv.currentValue);
                const profit = current - invested;
                const percent = invested > 0 ? (profit / invested) * 100 : 0;
                const isPositive = profit >= 0;

                return `
                    <tr class="border-b border-dark-border hover:bg-dark-bg transition-colors">
                        <td class="py-3 px-4 text-white">${inv.name}</td>
                        <td class="py-3 px-4 text-text-secondary">
                            <span class="bg-dark-bg px-2 py-1 rounded text-xs border border-dark-border">${inv.type}</span>
                        </td>
                        <td class="py-3 px-4 text-right text-text-secondary">${formatCurrency(invested)}</td>
                        <td class="py-3 px-4 text-right text-white font-medium">${formatCurrency(current)}</td>
                        <td class="py-3 px-4 text-right">
                            <div class="${isPositive ? 'text-green-400' : 'text-red-400'} font-bold">
                                ${isPositive ? '+' : ''}${formatCurrency(profit)}
                            </div>
                            <div class="text-xs ${isPositive ? 'text-green-500' : 'text-red-500'} opacity-80">
                                ${isPositive ? '▲' : '▼'} ${percent.toFixed(2)}%
                            </div>
                        </td>
                        <td class="py-3 px-4 text-right">
                             <button onclick="window.editInvestment('${inv.id}')" class="text-text-secondary hover:text-accent-purple mr-2">✎</button>
                             <button onclick="window.deleteInvestment('${inv.id}')" class="text-text-secondary hover:text-red-400">🗑</button>
                        </td>
                    </tr>
                `;
            }).join('');
        };

        const updateSummary = () => {
            const totalInvested = investments.reduce((sum, i) => sum + parseFloat(i.amountInvested), 0);
            const currentTotal = investments.reduce((sum, i) => sum + parseFloat(i.currentValue), 0);
            const yieldVal = currentTotal - totalInvested;
            const yieldPercent = totalInvested > 0 ? (yieldVal / totalInvested) * 100 : 0;

            document.getElementById('totalInvested').textContent = formatCurrency(totalInvested);
            document.getElementById('currentTotal').textContent = formatCurrency(currentTotal);

            const yieldEl = document.getElementById('totalYield');
            yieldEl.textContent = `${yieldVal >= 0 ? '+' : ''}${formatCurrency(yieldVal)} (${yieldPercent.toFixed(2)}%)`;
            yieldEl.className = `stat-value ${yieldVal >= 0 ? 'text-green-400' : 'text-red-400'}`;
        };

        // Handlers
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('investmentId').value;
            const data = {
                name: document.getElementById('name').value,
                type: document.getElementById('type').value,
                amountInvested: parseFloat(document.getElementById('amountInvested').value),
                currentValue: parseFloat(document.getElementById('currentValue').value),
                purchaseDate: document.getElementById('purchaseDate').value,
                notes: document.getElementById('notes').value
            };

            try {
                if (id) {
                    await investmentService.update(id, data);
                } else {
                    await investmentService.create(data);
                }
                closeModal();
                loadInvestments();
            } catch (error) {
                alert('Erro ao salvar investimento');
            }
        });

        window.editInvestment = (id) => {
            const inv = investments.find(i => i.id === id);
            if (inv) openModal(inv);
        };

        window.deleteInvestment = async (id) => {
            if (confirm('Tem certeza que deseja excluir este investimento?')) {
                try {
                    await investmentService.delete(id);
                    loadInvestments();
                } catch (error) {
                    alert('Erro ao excluir');
                }
            }
        };

        // Init
        loadInvestments();
    </script>
</body>

</html>
