<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - FinDash</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body class="min-h-screen bg-dark-bg text-text-primary font-sans antialiased flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold gradient-purple-blue bg-clip-text text-transparent">FinDash</h1>
            <p class="text-text-secondary mt-2">Crie sua conta</p>
        </div>

        <!-- Register Card -->
        <div class="card fade-in">
            <h2 class="text-2xl font-bold mb-6">Registrar</h2>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Nome</label>
                    <input type="text" id="name" class="input-field w-full" placeholder="Seu nome completo" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" class="input-field w-full" placeholder="seu@email.com" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Senha</label>
                    <input type="password" id="password" class="input-field w-full" placeholder="••••••••" required
                        minlength="6">
                </div>

                <div id="errorMessage" class="text-red-400 text-sm hidden"></div>

                <button type="submit" class="btn-primary w-full">
                    Criar Conta
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-text-secondary text-sm">
                    Já tem uma conta?
                    <a href="/login.html" class="text-accent-purple hover:underline">Entrar</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import authService from '/src/js/auth.js';

        // Redirect if already logged in
        if (authService.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        const form = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                errorMessage.classList.add('hidden');
                await authService.register(email, password, name);
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
