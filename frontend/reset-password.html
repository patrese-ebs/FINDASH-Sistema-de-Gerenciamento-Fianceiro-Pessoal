<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - FinDash</title>
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-dark-bg text-text-primary font-sans antialiased p-4">
    <div class="card max-w-md w-full fade-in relative overflow-hidden">
        <!-- Background Decoration -->
        <div
            class="absolute top-0 right-0 w-32 h-32 bg-accent-purple bg-opacity-10 rounded-full filter blur-xl -translate-y-1/2 translate-x-1/2">
        </div>
        <div
            class="absolute bottom-0 left-0 w-32 h-32 bg-accent-blue bg-opacity-10 rounded-full filter blur-xl translate-y-1/2 -translate-x-1/2">
        </div>

        <div class="relative z-10">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold gradient-purple-blue bg-clip-text text-transparent mb-2">FinDash</h1>
                <p class="text-text-secondary">Nova Senha</p>
            </div>

            <div id="errorMessage"
                class="hidden mb-6 p-4 bg-red-500 bg-opacity-10 border border-red-500 rounded-lg text-red-400 text-sm text-center">
            </div>
            <div id="successMessage"
                class="hidden mb-6 p-4 bg-green-500 bg-opacity-10 border border-green-500 rounded-lg text-green-400 text-sm text-center">
                Senha redefinida com sucesso! Redirecionando para login...
            </div>

            <form id="resetForm" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium mb-2 text-text-secondary">Nova Senha</label>
                    <input type="password" id="password" class="input-field w-full" placeholder="******" required
                        minlength="6">
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium mb-2 text-text-secondary">Confirmar
                        Nova Senha</label>
                    <input type="password" id="confirmPassword" class="input-field w-full" placeholder="******" required
                        minlength="6">
                </div>

                <button type="submit"
                    class="btn-primary w-full py-3 font-semibold shadow-lg hover:shadow-accent-purple/20 transition-all duration-300">
                    Redefinir Senha
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import api from '/src/js/api.js';

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const form = document.getElementById('resetForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = form.querySelector('button[type="submit"]');

        if (!token) {
            errorMessage.textContent = 'Token inválido ou expirado.';
            errorMessage.classList.remove('hidden');
            form.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            errorMessage.classList.add('hidden');

            if (password !== confirmPassword) {
                errorMessage.textContent = 'As senhas não coincidem.';
                errorMessage.classList.remove('hidden');
                return;
            }

            // Loading state
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Redefinindo...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                await api.post('/auth/reset-password', { token, newPassword: password });

                successMessage.classList.remove('hidden');
                form.classList.add('hidden');

                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 3000);
            } catch (error) {
                console.error('Error:', error);
                errorMessage.textContent = error.response?.data?.error || 'Erro ao redefinir senha. O link pode ter expirado.';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>

</html>
