<div class="min-h-screen bg-dark-bg flex items-center justify-center p-8"
    style="background-image: radial-gradient(ellipse at 70% 40%, rgba(245,158,11,0.05) 0%, transparent 55%), radial-gradient(ellipse at 20% 80%, rgba(16,185,129,0.04) 0%, transparent 50%);">

    <div class="w-full max-w-sm animate-enter">

        <!-- Logo -->
        <div class="flex items-center gap-2 mb-8">
            <div class="w-8 h-8 rounded flex items-center justify-center"
                style="background: linear-gradient(135deg, #10b981, #059669);">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 12L6 7L9 10L14 4" stroke="#080d1a" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <circle cx="14" cy="4" r="1.5" fill="#080d1a" />
                </svg>
            </div>
            <span class="text-lg font-bold text-text-primary">FinDash</span>
        </div>

        <div class="mb-8">
            <h1 class="text-2xl font-bold text-text-primary mb-1">Criar sua conta</h1>
            <p class="text-sm text-text-secondary">Comece a controlar suas finanças hoje</p>
        </div>

        <!-- Register Card -->
        <div class="fd-card p-6">
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
                <div>
                    <label class="fd-label">Nome completo</label>
                    <input id="register-name" type="text" formControlName="name" class="fd-input"
                        placeholder="Seu nome completo">
                    <div *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid"
                        class="text-accent-red text-xs mt-1.5 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        Nome é obrigatório (mín. 2 caracteres).
                    </div>
                </div>

                <div>
                    <label class="fd-label">Email</label>
                    <input id="register-email" type="email" formControlName="email" class="fd-input"
                        placeholder="seu@email.com">
                    <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
                        class="text-accent-red text-xs mt-1.5 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        Email válido é obrigatório.
                    </div>
                </div>

                <div>
                    <label class="fd-label">Senha</label>
                    <input id="register-password" type="password" formControlName="password" class="fd-input"
                        placeholder="Mínimo 6 caracteres">
                    <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
                        class="text-accent-red text-xs mt-1.5 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                                clip-rule="evenodd" />
                        </svg>
                        Senha deve ter no mínimo 6 caracteres.
                    </div>
                </div>

                <div *ngIf="errorMessage"
                    class="flex items-center gap-2 text-accent-red text-sm bg-accent-red/5 border border-accent-red/20 rounded-md px-4 py-3">
                    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                            clip-rule="evenodd" />
                    </svg>
                    {{ errorMessage }}
                </div>

                <button id="register-submit" type="submit" [disabled]="loading"
                    class="fd-btn-primary w-full py-3 text-sm disabled:opacity-50 disabled:cursor-not-allowed mt-2">
                    <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                    </svg>
                    {{ loading ? 'Criando conta...' : 'Criar Conta' }}
                </button>
            </form>
        </div>

        <div class="mt-5 text-center">
            <p class="text-sm text-text-secondary">
                Já tem uma conta?
                <a routerLink="/login" class="text-accent-emerald hover:underline cursor-pointer font-medium ml-1">
                    Entrar
                </a>
            </p>
        </div>
    </div>
</div>
