<nav class="fixed left-0 top-0 h-full w-60 flex flex-col z-40"
    style="background: linear-gradient(180deg, #0d1526 0%, #080d1a 100%); border-right: 1px solid #1e2d45;">

    <!-- Logo -->
    <div class="px-5 py-6 border-b border-dark-border">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded flex items-center justify-center flex-shrink-0"
                style="background: linear-gradient(135deg, #10b981, #059669);">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 12L6 7L9 10L14 4" stroke="#080d1a" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <circle cx="14" cy="4" r="1.5" fill="#080d1a" />
                </svg>
            </div>
            <div>
                <span class="text-lg font-bold text-text-primary tracking-tight">FinDash</span>
                <div class="text-[10px] text-text-secondary font-medium tracking-widest uppercase">Finanças</div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <p class="text-[10px] font-semibold text-text-muted uppercase tracking-widest px-3 mb-3">Principal</p>

        <a routerLink="/dashboard" routerLinkActive="active" class="fd-nav-item group"
            [routerLinkActiveOptions]="{exact: true}">
            <svg class="w-4 h-4 flex-shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            <span>Dashboard</span>
        </a>

        <a routerLink="/transactions" routerLinkActive="active" class="fd-nav-item group">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4" />
            </svg>
            <span>Transações</span>
        </a>

        <a routerLink="/credit-cards" routerLinkActive="active" class="fd-nav-item group">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <rect x="2" y="5" width="20" height="14" rx="2" />
                <path stroke-linecap="round" d="M2 10h20" />
                <path stroke-linecap="round" stroke-width="2" d="M6 15h4" />
            </svg>
            <span>Cartões</span>
        </a>

        <a routerLink="/investments" routerLinkActive="active" class="fd-nav-item group">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                <polyline points="16 7 22 7 22 13" />
            </svg>
            <span>Investimentos</span>
        </a>

        <a routerLink="/goals" routerLinkActive="active" class="fd-nav-item group">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="6" />
                <circle cx="12" cy="12" r="2" />
            </svg>
            <span>Metas</span>
        </a>
    </div>

    <!-- Bottom Section -->
    <div class="px-3 py-4 border-t border-dark-border space-y-0.5">
        <a routerLink="/minha-conta" routerLinkActive="active" class="fd-nav-item group">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <circle cx="12" cy="8" r="4" />
                <path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            <span>Minha Conta</span>
        </a>

        <button (click)="logout()"
            class="fd-nav-item w-full text-left hover:text-accent-red hover:bg-accent-red/5 group">
            <svg class="w-4 h-4 flex-shrink-0 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.75">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Sair</span>
        </button>
    </div>
</nav>
